version: "3.8"

services:
  backend:
    build: .
    container_name: fleet_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fleet_db
    volumes:
      - .:/app

  db:
    image: postgres:15
    container_name: fleet_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fleet_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: fleet_redis
    ports:
      - "6379:6379"
